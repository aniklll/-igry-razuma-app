<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Игры разума</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    /* цвета берутся из темы Telegram, с запасными значениями */
    --bg: var(--tg-theme-bg-color, #17212b);
    --text: var(--tg-theme-text-color, #f5f5f5);
    --hint: var(--tg-theme-hint-color, #8a9aa9);
    --card: var(--tg-theme-secondary-bg-color, #232e3c);
    --accent: var(--tg-theme-button-color, #4f9cf9);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --mine: #f9c74f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg); color: var(--text); font-size: 15px;
  }
  .topbar {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 14px 16px 8px;
  }
  .title { font-weight: 700; font-size: 18px; }
  .season { color: var(--hint); font-size: 13px; }
  .tabs { display: flex; gap: 6px; padding: 0 12px 8px; overflow-x: auto; }
  .tab {
    flex: 0 0 auto; border: none; background: var(--card); color: var(--text);
    padding: 8px 14px; border-radius: 18px; font-size: 14px; cursor: pointer;
  }
  .tab.active { background: var(--accent); color: var(--accent-text); font-weight: 600; }
  main { padding: 8px 12px 32px; }
  .loader, .empty { color: var(--hint); text-align: center; padding: 32px 0; }

  /* сегмент-контрол выбора формата (Синхрон | Матрица | Все) */
  .segment {
    display: flex; gap: 4px; background: var(--card); border-radius: 12px;
    padding: 4px; margin-bottom: 10px;
  }
  .seg {
    flex: 1; border: none; background: transparent; color: var(--text);
    padding: 8px 6px; border-radius: 9px; font-size: 14px; cursor: pointer;
  }
  .seg.active { background: var(--accent); color: var(--accent-text); font-weight: 600; }
  .list { min-height: 40px; }

  .row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
  }
  .row.mine { outline: 2px solid var(--mine); }
  .place { width: 30px; text-align: center; font-weight: 700; }
  .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pts { font-weight: 700; }
  .sub { color: var(--hint); font-size: 12px; }

  .banner {
    background: var(--card); border-radius: 12px; padding: 10px 12px;
    margin-bottom: 10px; color: var(--mine); font-weight: 600; text-align: center;
  }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--card); border-radius: 12px; padding: 12px; }
  .metric .v { font-size: 22px; font-weight: 700; }
  .metric .k { color: var(--hint); font-size: 12px; margin-top: 2px; }

  .spark { display: flex; align-items: flex-end; gap: 3px; height: 48px; margin: 6px 0 14px; }
  .spark i { display: block; flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 3px; }

  .badges { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge { background: var(--card); border-radius: 20px; padding: 8px 14px; font-weight: 600; }

  .bindhint { background: var(--card); border-radius: 12px; padding: 16px; color: var(--hint); line-height: 1.5; }
  code { background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
  <header class="topbar">
    <div class="title">🧠 Игры разума</div>
    <div id="season" class="season"></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="scoreboard">Табло</button>
    <button class="tab" data-tab="season">Сезон</button>
    <button class="tab" data-tab="profile">Профиль</button>
    <button class="tab" data-tab="achievements">Ачивки</button>
  </nav>

  <main id="content">
    <div class="loader">Загрузка…</div>
  </main>

  <!-- ЕДИНСТВЕННАЯ НАСТРОЙКА: вставьте сюда URL вашего Web App (Apps Script, вида
       https://script.google.com/macros/s/…/exec) вместо текста-заглушки. -->
  <script>
    window.API_BASE = 'https://script.google.com/macros/s/AKfycbwszeeKDoDhoZCcDl6K3r8-2PRWosbdFP7tQsGTYna7Vd_-dzw1fo-GSM1SEAnpH7al/exec';
  </script>
<script>
(function () {
  var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  var initData = tg ? tg.initData : '';
  if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }

  var content = document.getElementById('content');
  var seasonEl = document.getElementById('season');
  var refreshTimer = null;

  // Форматы турниров — единый источник имён (совпадает с SHEETS.gameSheets на бэкенде).
  var FORMATS = ['Синхрон', 'Матрица'];
  // Текущий выбранный формат для табло/профиля; для сезона добавляется «Все».
  var boardFormat = FORMATS[0];
  var seasonFormat = 'all';      // 'all' | 'Синхрон' | 'Матрица'
  var profileFormat = 'all';     // 'all' | 'Синхрон' | 'Матрица'

  // Название своей команды: из URL (?team=) — fallback, если бот не привязан.
  var urlTeam = new URLSearchParams(location.search).get('team') || '';

  function api(action, params) {
    var url = window.API_BASE + '?action=' + encodeURIComponent(action);
    if (initData) url += '&initData=' + encodeURIComponent(initData);
    if (!initData && urlTeam) url += '&team=' + encodeURIComponent(urlTeam);
    if (params) {
      Object.keys(params).forEach(function (k) {
        if (params[k] != null && params[k] !== '') url += '&' + k + '=' + encodeURIComponent(params[k]);
      });
    }
    return fetch(url).then(function (r) { return r.json(); });
  }

  function esc(s) { return String(s).replace(/[&<>]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]; }); }
  function setBusy() { content.innerHTML = '<div class="loader">Загрузка…</div>'; }
  function empty(msg) { return '<div class="empty">' + esc(msg) + '</div>'; }

  var myName = null; // определится из профиля
  function medal(place) { return place === 1 ? '🥇' : place === 2 ? '🥈' : place === 3 ? '🥉' : place; }

  /**
   * Сегмент-контрол выбора формата.
   * options — массив [{v:'Синхрон',t:'Синхрон'}, ...]; active — текущее значение;
   * onPick(value) — колбэк. Возвращает DOM-узел.
   */
  function segment(options, active, onPick) {
    var wrap = document.createElement('div');
    wrap.className = 'segment';
    options.forEach(function (o) {
      var b = document.createElement('button');
      b.className = 'seg' + (o.v === active ? ' active' : '');
      b.textContent = o.t;
      b.addEventListener('click', function () { onPick(o.v); });
      wrap.appendChild(b);
    });
    return wrap;
  }

  /* -------- Табло (переключатель Синхрон | Матрица) -------- */
  function renderScoreboard() {
    setBusy();
    content.innerHTML = '';
    content.appendChild(segment(
      FORMATS.map(function (f) { return { v: f, t: f }; }),
      boardFormat,
      function (v) { boardFormat = v; renderScoreboard(); }
    ));
    var list = document.createElement('div');
    list.className = 'list';
    list.innerHTML = '<div class="loader">Загрузка…</div>';
    content.appendChild(list);

    api('scoreboard', { format: boardFormat }).then(function (d) {
      if (!d.rows || !d.rows.length) { list.innerHTML = empty('Пока нет результатов текущей игры (' + esc(boardFormat) + ').'); return; }
      var mine = null;
      if (myName) { d.rows.forEach(function (r) { if (r.name === myName) mine = r; }); }
      var html = '';
      if (mine) {
        var gap = '';
        if (mine.place > 1) {
          var above = d.rows[mine.place - 2];
          gap = 'До ' + (mine.place - 1) + '-го места: ' + (above.points - mine.points) + ' баллов';
        } else { gap = 'Вы лидируете! 🎉'; }
        html += '<div class="banner">«' + esc(mine.name) + '» — ' + mine.place + ' место (' + esc(boardFormat) + '). ' + esc(gap) + '</div>';
      }
      d.rows.forEach(function (r) {
        html += '<div class="row' + (r.name === myName ? ' mine' : '') + '">' +
          '<div class="place">' + medal(r.place) + '</div>' +
          '<div class="name">' + esc(r.name) + '</div>' +
          '<div class="pts">' + r.points + '</div></div>';
      });
      list.innerHTML = html;
    }).catch(function () { list.innerHTML = empty('Не удалось загрузить табло.'); });
  }

  /* -------- Сезон (Все | Синхрон | Матрица) -------- */
  function renderSeason() {
    setBusy();
    content.innerHTML = '';
    content.appendChild(segment(
      [{ v: 'all', t: 'Все' }].concat(FORMATS.map(function (f) { return { v: f, t: f }; })),
      seasonFormat,
      function (v) { seasonFormat = v; renderSeason(); }
    ));
    var list = document.createElement('div');
    list.className = 'list';
    list.innerHTML = '<div class="loader">Загрузка…</div>';
    content.appendChild(list);

    var params = seasonFormat === 'all' ? {} : { format: seasonFormat };
    api('season', params).then(function (d) {
      seasonEl.textContent = d.season ? 'Сезон: ' + d.season : '';
      if (!d.rows || !d.rows.length) { list.innerHTML = empty('Нет данных за сезон.'); return; }
      var html = '';
      d.rows.forEach(function (r) {
        html += '<div class="row' + (r.name === myName ? ' mine' : '') + '">' +
          '<div class="place">' + medal(r.rank) + '</div>' +
          '<div class="name">' + esc(r.name) + '<div class="sub">' + r.games + ' игр</div></div>' +
          '<div class="pts">' + r.points + '</div></div>';
      });
      list.innerHTML = html;
    }).catch(function () { list.innerHTML = empty('Не удалось загрузить рейтинг.'); });
  }

  /* -------- Профиль (метрики: Все | Синхрон | Матрица) -------- */
  var profileData = null; // кэш ответа, чтобы переключать формат без повторного запроса

  function renderProfile() {
    setBusy();
    api('profile').then(function (d) {
      if (d.error || !d.name) {
        content.innerHTML = '<div class="bindhint">Чтобы увидеть профиль своей команды, привяжите чат к команде в боте:<br><br>' +
          'отправьте боту <code>/start Название команды</code>.<br><br>' +
          'Например: <code>/start Вжух</code>.</div>';
        return;
      }
      myName = d.name;
      profileData = d;
      drawProfile();
    }).catch(function () { content.innerHTML = empty('Не удалось загрузить профиль.'); });
  }

  function drawProfile() {
    var d = profileData;
    // выбор среза статистики по формату
    var s = (profileFormat === 'all') ? (d.stats || {})
      : ((d.statsByFormat && d.statsByFormat[profileFormat]) || {});

    content.innerHTML = '';
    var head = document.createElement('h3');
    head.style.margin = '6px 4px 10px';
    head.textContent = d.name;
    content.appendChild(head);

    content.appendChild(segment(
      [{ v: 'all', t: 'Все' }].concat(FORMATS.map(function (f) { return { v: f, t: f }; })),
      profileFormat,
      function (v) { profileFormat = v; drawProfile(); }
    ));

    var body = document.createElement('div');
    var html = '<div class="metrics">' +
      metric(s.seasonPlace || '—', 'Место в сезоне') +
      metric(s.wins || 0, 'Побед') +
      metric(s.best || '—', 'Лучшее место') +
      metric(s.avg || 0, 'Средний балл') +
      metric(s.games || 0, 'Игр сыграно') +
      metric(s.points || 0, 'Очки сезона') +
      '</div>';

    // спарклайн динамики (история фильтруется по формату на клиенте)
    var hist = (d.history || []).filter(function (h) { return profileFormat === 'all' || h.format === profileFormat; });
    if (hist.length) {
      var max = Math.max.apply(null, hist.map(function (h) { return h.points; })) || 1;
      html += '<div class="sub" style="margin:0 4px">Динамика очков по турам</div><div class="spark">';
      hist.forEach(function (h) { html += '<i style="height:' + Math.round(h.points / max * 100) + '%" title="' + esc(h.format) + ', тур ' + h.gameNo + ': ' + h.points + '"></i>'; });
      html += '</div>';
    }

    // бейджи (общие, без разбивки по формату)
    if (d.badges && d.badges.length) {
      html += '<div class="sub" style="margin:0 4px 6px">Ачивки</div><div class="badges">';
      d.badges.forEach(function (b) { html += '<div class="badge">' + esc(b.title) + '</div>'; });
      html += '</div>';
    }
    body.innerHTML = html;
    content.appendChild(body);
  }

  function metric(v, k) { return '<div class="metric"><div class="v">' + esc(v) + '</div><div class="k">' + esc(k) + '</div></div>'; }

  /* -------- Ачивки -------- */
  function renderAchievements() {
    setBusy();
    api('achievements').then(function (d) {
      if (d.error || !d.badges) { content.innerHTML = empty('Привяжите команду в боте (/start Название), чтобы видеть ачивки.'); return; }
      if (!d.badges.length) { content.innerHTML = empty('Пока нет ачивок. Всё впереди!'); return; }
      var html = '<div class="badges">';
      d.badges.forEach(function (b) { html += '<div class="badge">' + esc(b.title) + '</div>'; });
      content.innerHTML = html + '</div>';
    }).catch(function () { content.innerHTML = empty('Не удалось загрузить ачивки.'); });
  }

  /* -------- Навигация -------- */
  var renderers = { scoreboard: renderScoreboard, season: renderSeason, profile: renderProfile, achievements: renderAchievements };

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === tab); });
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    renderers[tab]();
    if (tab === 'scoreboard') refreshTimer = setInterval(renderScoreboard, 20000); // автообновление табло текущего формата
  }

  document.querySelectorAll('.tab').forEach(function (b) {
    b.addEventListener('click', function () { switchTab(b.dataset.tab); });
  });

  // Стартовый прогрев: узнаём свою команду (для подсветки на табло), затем показываем табло.
  var boot = (initData || urlTeam)
    ? api('profile').then(function (d) { if (d && d.name) myName = d.name; }).catch(function () {})
    : Promise.resolve();
  boot.then(function () { switchTab('scoreboard'); });
})();
</script>
</body>
</html>
