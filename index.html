<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Игры разума</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Ранний TLS-хендшейк с серверами API: первый запрос уходит быстрее.
       (script.google.com отвечает редиректом на script.googleusercontent.com —
       прогреваем оба.) -->
  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
  <style>
    /* ============ Палитра: премиум A+C, индиго-акцент ============ */
    :root {
      --accent: #7c6cff;
      --accent-soft: rgba(124, 108, 255, 0.14);
      --accent-border: rgba(124, 108, 255, 0.55);
      --gold: #f5c542;
      --gold-soft: rgba(245, 197, 66, 0.14);
      --silver: #c8cede;
      --bronze: #e8a06a;
      --radius: 16px;
    }
    html[data-theme="dark"] {
      --bg: #0e1119;
      --bg-elev: rgba(23, 27, 40, 0.85);
      --card: #171b28;
      --card-2: #1e2334;
      --text: #eef0f8;
      --muted: #8b90a5;
      --line: rgba(255, 255, 255, 0.07);
      --skeleton: rgba(255, 255, 255, 0.06);
      --skeleton-shine: rgba(255, 255, 255, 0.12);
    }
    html[data-theme="light"] {
      --bg: #f1f2f7;
      --bg-elev: rgba(255, 255, 255, 0.85);
      --card: #ffffff;
      --card-2: #f6f6fb;
      --text: #191c2b;
      --muted: #7a7f95;
      --line: rgba(20, 22, 40, 0.08);
      --skeleton: rgba(20, 22, 40, 0.06);
      --skeleton-shine: rgba(20, 22, 40, 0.12);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text); font-size: 15px;
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
      transition: background .25s ease, color .25s ease;
    }

    /* ============ Шапка ============ */
    .topbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: baseline; justify-content: space-between;
      /* в полноэкранном режиме Telegram сверху системная строка и кнопки клиента —
         отступаем на их высоту (переменные даёт Telegram, вне его равны нулю) */
      padding: calc(14px + var(--tg-safe-area-inset-top, 0px) + var(--tg-content-safe-area-inset-top, 0px)) 16px 10px;
      background: var(--bg-elev);
      -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .title { font-weight: 700; font-size: 17px; letter-spacing: .2px; }
    .title .dot { color: var(--accent); }
    .season { color: var(--muted); font-size: 12px; }
    main { padding: 12px 14px 24px; max-width: 560px; margin: 0 auto; }

    /* ============ Сегмент-контрол ============ */
    .segment {
      display: flex; gap: 4px; background: var(--card); border-radius: 12px;
      padding: 4px; margin-bottom: 12px; border: 1px solid var(--line);
    }
    .seg {
      flex: 1; border: none; background: transparent; color: var(--muted);
      padding: 8px 6px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .2s ease, color .2s ease;
    }
    .seg.active { background: var(--accent); color: #fff; }

    /* ============ Подиум топ-3 ============ */
    .podium { display: flex; align-items: flex-end; gap: 8px; margin: 6px 2px 14px; }
    .pod { flex: 1; text-align: center; animation: rise .45s ease both; }
    .pod .avarow { display: flex; justify-content: center; margin-bottom: 6px; }
    .pod .ava {
      width: 44px; height: 44px; border-radius: 50%; margin: 0 -6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: var(--muted);
      background: var(--card-2); border: 2px solid var(--line);
    }
    .pod .nm { font-size: 11px; font-weight: 600; padding: 0 2px; line-height: 1.3; overflow: hidden; }
    .pod .pts { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .pod .base {
      margin-top: 6px; border-radius: 10px 10px 0 0; background: var(--card);
      border: 1px solid var(--line); border-bottom: none;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: var(--muted);
    }
    .pod.p1 .base { height: 64px; color: var(--gold); background: var(--gold-soft); border-color: rgba(245,197,66,.4); }
    .pod.p1 .ava { border-color: var(--gold); background: var(--gold-soft); color: var(--gold); box-shadow: 0 0 18px rgba(245,197,66,.35); }
    .pod.p2 .base { height: 46px; color: var(--silver); }
    .pod.p2 .ava { border-color: var(--silver); color: var(--silver); }
    .pod.p3 .base { height: 34px; color: var(--bronze); }
    .pod.p3 .ava { border-color: var(--bronze); color: var(--bronze); }
    .pod.mine .nm { color: var(--accent); }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    /* ============ Строки рейтинга ============ */
    .banner {
      background: var(--accent-soft); border: 1px solid var(--accent-border);
      border-radius: var(--radius); padding: 10px 14px; margin-bottom: 10px;
      font-size: 13px; font-weight: 600; text-align: center; color: var(--accent);
      animation: fadeUp .4s ease both;
    }
    .row {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 11px 14px; margin-bottom: 8px;
      animation: fadeUp .35s ease both;
    }
    .row.mine {
      border-color: var(--accent-border); background: var(--accent-soft);
      box-shadow: 0 0 16px rgba(124, 108, 255, .18);
    }
    .row .place { min-width: 28px; text-align: center; font-weight: 800; font-size: 14px; color: var(--muted); }
    .row.g1 .place { color: var(--gold); }
    .row.g2 .place { color: var(--silver); }
    .row.g3 .place { color: var(--bronze); }
    .row .name { flex: 1; font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row .you {
      font-size: 10px; font-weight: 700; color: #fff; background: var(--accent);
      border-radius: 8px; padding: 2px 7px; margin-left: 6px; vertical-align: 1px;
    }
    .row .pts { font-weight: 800; font-size: 15px; }
    .row .sub { color: var(--muted); font-size: 11px; font-weight: 500; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ============ Скелетоны ============ */
    .sk {
      height: 46px; border-radius: var(--radius); margin-bottom: 8px;
      background: linear-gradient(100deg, var(--skeleton) 40%, var(--skeleton-shine) 50%, var(--skeleton) 60%);
      background-size: 200% 100%; animation: shine 1.2s linear infinite;
    }
    @keyframes shine { to { background-position: -200% 0; } }
    .empty { color: var(--muted); text-align: center; padding: 36px 12px; font-size: 14px; line-height: 1.5; }

    /* ============ Профиль ============ */
    .phead { display: flex; align-items: center; gap: 14px; margin: 4px 2px 14px; animation: fadeUp .35s ease both; }
    .phead .ava {
      width: 56px; height: 56px; border-radius: 50%; flex: 0 0 auto;
      background: var(--accent-soft); border: 2px solid var(--accent-border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 22px; color: var(--accent);
    }
    .phead .nm { font-size: 18px; font-weight: 700; }
    .phead .sb { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .metric {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 12px 8px; text-align: center; animation: fadeUp .35s ease both;
    }
    .metric .v { font-size: 20px; font-weight: 800; }
    .metric.gold .v { color: var(--gold); }
    .metric .k { color: var(--muted); font-size: 10px; margin-top: 3px; font-weight: 600; letter-spacing: .3px; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 14px; margin-bottom: 12px; animation: fadeUp .35s ease both;
    }
    .card h4 { margin: 0 0 10px; font-size: 12px; color: var(--muted); font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
    .spark-svg { width: 100%; height: 64px; display: block; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      background: var(--gold-soft); border: 1px solid rgba(245, 197, 66, .4);
      color: var(--gold); border-radius: 20px; padding: 8px 14px;
      font-weight: 700; font-size: 13px; animation: fadeUp .35s ease both;
    }
    .sharebar { display: flex; gap: 8px; margin: 0 0 12px; }
    .sharebtn {
      flex: 1; border: 1px solid var(--accent-border); background: var(--accent-soft);
      color: var(--accent); font-weight: 700; font-size: 13px; cursor: pointer;
      border-radius: 12px; padding: 10px 8px; transition: transform .12s ease;
    }
    .sharebtn:active { transform: scale(.97); }
    .sharebtn.story { border-color: rgba(245, 197, 66, .45); background: var(--gold-soft); color: var(--gold); }
    .bindhint { line-height: 1.6; color: var(--muted); font-size: 14px; }
    .bindhint code { background: var(--accent-soft); color: var(--accent); padding: 2px 7px; border-radius: 6px; font-size: 13px; }

    /* ============ Нижняя навигация ============ */
    .tabbar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
      display: flex; justify-content: space-around;
      background: var(--bg-elev);
      -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    }
    .tab {
      flex: 1; max-width: 110px; border: none; background: transparent; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      color: var(--muted); padding: 6px 4px; border-radius: 12px;
      transition: color .2s ease, background .2s ease;
    }
    .tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tab span { font-size: 10px; font-weight: 600; }
    .tab.active { color: var(--accent); background: var(--accent-soft); }

    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    /* ============ Заставка первичной загрузки ============ */
    #splash {
      position: fixed; inset: 0; z-index: 60;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
      background: var(--bg);
      transition: opacity .45s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    /* Логотип виден мгновенно (37KB), поверх него — неоновая видео-анимация,
       как только докачается (200KB); если видео не заведётся — остаётся логотип */
    .splash-logo {
      width: min(64vw, 280px); height: min(64vw, 280px);
      border-radius: 32px; overflow: hidden; position: relative;
      background: #0a1128;
      box-shadow: 0 18px 64px rgba(86, 120, 255, 0.30);
      animation: splashPulse 2.2s ease-in-out infinite;
    }
    .splash-logo img, .splash-logo video {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 18px 64px rgba(86, 120, 255, 0.26); }
      50% { transform: scale(1.03); box-shadow: 0 22px 80px rgba(86, 120, 255, 0.45); }
    }
    .splash-dots { display: flex; gap: 7px; }
    .splash-dots i {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent); opacity: 0.35;
      animation: splashDot 1.1s ease-in-out infinite;
    }
    .splash-dots i:nth-child(2) { animation-delay: 0.18s; }
    .splash-dots i:nth-child(3) { animation-delay: 0.36s; }
    @keyframes splashDot { 40% { opacity: 1; transform: translateY(-4px); } }

    /* ============ Селекторы (сезон, команда) и админ ============ */
    .pickrow { display: flex; gap: 8px; margin-bottom: 10px; animation: fadeUp .3s ease both; }
    .pickrow label {
      flex: 0 0 auto; align-self: center; color: var(--muted);
      font-size: 12px; font-weight: 600;
    }
    select.picker {
      flex: 1; min-width: 0; appearance: none; -webkit-appearance: none;
      background: var(--card) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" fill="none" stroke="%238b90a5" stroke-width="2" stroke-linecap="round"/></svg>') no-repeat right 12px center;
      color: var(--text); border: 1px solid var(--line); border-radius: 12px;
      padding: 10px 34px 10px 12px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .adminchip {
      font-size: 10px; font-weight: 800; letter-spacing: .4px;
      color: var(--gold); background: var(--gold-soft);
      border: 1px solid rgba(245, 197, 66, .45);
      border-radius: 8px; padding: 2px 7px; margin-left: 7px; vertical-align: 2px;
    }

    /* ============ Браузер/десктоп: та же страница, шире и просторнее ============ */
    @media (min-width: 700px) {
      main { max-width: 680px; padding: 16px 20px 32px; }
      .topbar { padding-left: 24px; padding-right: 24px; }
      .tabbar { justify-content: center; gap: 18px; }
      .pod .ava { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <!-- Заставка: логотип виден мгновенно при открытии, поверх запускается
       видео-анимация; всё исчезает после первой отрисовки табло -->
  <div id="splash">
    <div class="splash-logo">
      <img src="logo.jpg" alt="Игры разума">
      <video src="loading.mp4" muted autoplay loop playsinline></video>
    </div>
    <div class="splash-dots"><i></i><i></i><i></i></div>
  </div>
  <header class="topbar">
    <div class="title">🧠 Игры разума<span class="dot">.</span></div>
    <div id="season" class="season"></div>
  </header>

  <main id="content"></main>

  <nav class="tabbar">
    <button class="tab active" data-tab="scoreboard">
      <svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4zM7 6H4v2a3 3 0 0 0 3 3M17 6h3v2a3 3 0 0 1-3 3"/></svg>
      <span>Табло</span>
    </button>
    <button class="tab" data-tab="season">
      <svg viewBox="0 0 24 24"><path d="M4 19V10M10 19V5M16 19v-6M20 19H4"/></svg>
      <span>Сезон</span>
    </button>
    <button class="tab" data-tab="profile">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5"/></svg>
      <span>Профиль</span>
    </button>
    <button class="tab" data-tab="achievements">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="5"/><path d="M9 13.5 7 21l5-2.5L17 21l-2-7.5"/></svg>
      <span>Ачивки</span>
    </button>
  </nav>

  <canvas id="confetti"></canvas>

  <!-- ЕДИНСТВЕННАЯ НАСТРОЙКА: вставьте сюда URL вашего Web App (Apps Script, вида
       https://script.google.com/macros/s/…/exec) вместо текста-заглушки. -->
  <script>
    window.API_BASE = 'https://script.google.com/macros/s/AKfycbwszeeKDoDhoZCcDl6K3r8-2PRWosbdFP7tQsGTYna7Vd_-dzw1fo-GSM1SEAnpH7al/exec';
    window.BOT_LINK = 'https://t.me/MGamesinfo_Bot'; // ссылка на бота — для кнопок «Поделиться»
  </script>

  <script>
  (function () {
    var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    var initData = tg ? tg.initData : '';
    if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }

    // Полноэкранный режим (Bot API 8.0+) — только на телефонах, на десктопе неуместен
    if (tg && tg.isVersionAtLeast && tg.isVersionAtLeast('8.0') &&
        (tg.platform === 'ios' || tg.platform === 'android')) {
      try { tg.requestFullscreen(); } catch (e) {}
    }

    /* ---------- Тема: тёмный премиум + светлая версия по теме Telegram ---------- */
    function applyTheme() {
      var scheme = tg && tg.colorScheme ? tg.colorScheme
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', scheme === 'light' ? 'light' : 'dark');
      // Красим шапку/фон Telegram под приложение (поддерживается с версии 6.1)
      if (tg && tg.isVersionAtLeast && tg.isVersionAtLeast('6.1')) {
        try {
          tg.setHeaderColor(scheme === 'light' ? '#f1f2f7' : '#0e1119');
          tg.setBackgroundColor(scheme === 'light' ? '#f1f2f7' : '#0e1119');
        } catch (e) {}
      }
    }
    applyTheme();
    if (tg) { try { tg.onEvent('themeChanged', applyTheme); } catch (e) {} }

    /* ---------- Хаптика ---------- */
    function buzz(style) {
      try { tg.HapticFeedback.impactOccurred(style || 'light'); } catch (e) {}
    }

    var content = document.getElementById('content');
    var seasonEl = document.getElementById('season');
    var refreshTimer = null;

    /* ---------- Заставка: скрываем после первой отрисовки данных ---------- */
    var splash = document.getElementById('splash');
    var splashDone = false;
    function hideSplash() {
      if (splashDone || !splash) return;
      splashDone = true;
      splash.classList.add('hide');
      setTimeout(function () { try { splash.remove(); } catch (e) {} }, 500);
    }
    setTimeout(hideSplash, 8000); // страховка: не держим заставку дольше 8 секунд

    var FORMATS = ['Синхрон', 'Матрица'];
    var boardFormat = FORMATS[0];
    var seasonFormat = 'all';
    var profileFormat = 'all';
    var seasonSel = '';   // выбранный сезон ('' = текущий)
    var myName = null;
    var meta = null;      // ответ action=meta: сезоны, админ, своя команда
    var teamsList = null; // список команд (для выбора в браузере/админом)

    // Вне Telegram (обычный браузер) приложение работает автономно:
    // выбранная команда и кэш живут в localStorage (переживают закрытие вкладки).
    var store = initData ? sessionStorage : localStorage;

    // Команда, чей профиль смотрим: ?team= из ссылки, выбор в браузере
    // или выбор админа. В Telegram у привязанного игрока пусто — команда
    // определяется на сервере по подписи initData.
    var viewTeam = new URLSearchParams(location.search).get('team') || '';
    if (!initData && !viewTeam) { try { viewTeam = store.getItem('igr_team') || ''; } catch (e) {} }

    function teamParams(extra) {
      var p = extra || {};
      if (viewTeam && !p.team) p.team = viewTeam;
      return p;
    }

    function api(action, params) {
      var url = window.API_BASE + '?action=' + encodeURIComponent(action);
      if (initData) url += '&initData=' + encodeURIComponent(initData);
      if (params) {
        Object.keys(params).forEach(function (k) {
          if (params[k] != null && params[k] !== '') url += '&' + k + '=' + encodeURIComponent(params[k]);
        });
      }
      return fetch(url).then(function (r) { return r.json(); });
    }

    /* ---------- Кэш «показать сразу, обновить тихо» ----------
       Каждый ответ API запоминается (и переживает перезапуск через sessionStorage).
       При открытии вкладки данные из кэша рисуются МГНОВЕННО, параллельно уходит
       запрос за свежими; перерисовка — только если данные реально изменились. */
    var apiCache = {};
    try { apiCache = JSON.parse(store.getItem('igr_cache') || '{}'); } catch (e) {}
    function swr(action, params, onData, onError) {
      var key = action + '|' + JSON.stringify(params || {});
      var hit = apiCache[key];
      if (hit) { try { onData(hit, true); } catch (e) {} }
      api(action, params).then(function (d) {
        var same = hit && JSON.stringify(hit) === JSON.stringify(d);
        apiCache[key] = d;
        try { store.setItem('igr_cache', JSON.stringify(apiCache)); } catch (e) {}
        if (!same) onData(d, false);
      }).catch(function (err) {
        if (!hit && onError) onError(err);
      });
    }
    // Прогрев: после старта тихо тянем данные остальных вкладок — переключение мгновенно
    function prefetch() {
      swr('scoreboard', { format: FORMATS[1] }, function () {});
      swr('season', {}, function () {});
      if (initData || viewTeam) swr('achievements', teamParams(), function () {});
      if (!initData || (meta && meta.admin)) loadTeams(function () {});
    }
    // Список команд — для выбора команды в браузере и админом
    function loadTeams(cb) {
      if (teamsList) { cb(teamsList); return; }
      swr('teams', {}, function (d) {
        if (d && d.teams) { teamsList = d.teams; cb(teamsList); }
      }, function () { cb(null); });
    }

    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
    function initials(name) { return esc(String(name).trim().charAt(0).toUpperCase() || '?'); }
    function skeleton(n) {
      var h = '';
      for (var i = 0; i < n; i++) h += '<div class="sk" style="animation-delay:' + (i * 60) + 'ms"></div>';
      return h;
    }
    function empty(msg) { return '<div class="empty">' + msg + '</div>'; }
    function stagger(el) {
      Array.prototype.forEach.call(el.querySelectorAll('.row, .metric, .badge'), function (node, i) {
        node.style.animationDelay = (i * 35) + 'ms';
      });
    }

    function segment(options, active, onPick) {
      var wrap = document.createElement('div');
      wrap.className = 'segment';
      options.forEach(function (o) {
        var b = document.createElement('button');
        b.className = 'seg' + (o.v === active ? ' active' : '');
        b.textContent = o.t;
        b.addEventListener('click', function () { buzz('light'); onPick(o.v); });
        wrap.appendChild(b);
      });
      return wrap;
    }

    /* ---------- Конфетти (когда своя команда на 1 месте) ---------- */
    function confetti() {
      var cv = document.getElementById('confetti');
      var ctx = cv.getContext('2d');
      cv.width = innerWidth; cv.height = innerHeight;
      var colors = ['#f5c542', '#7c6cff', '#5ecf8b', '#ff7a9c', '#6fc3ff'];
      var parts = [];
      for (var i = 0; i < 90; i++) {
        parts.push({
          x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.4,
          vy: 2 + Math.random() * 3, vx: -1.5 + Math.random() * 3,
          s: 4 + Math.random() * 5, r: Math.random() * Math.PI,
          c: colors[i % colors.length],
        });
      }
      var t0 = Date.now();
      (function frame() {
        ctx.clearRect(0, 0, cv.width, cv.height);
        parts.forEach(function (p) {
          p.x += p.vx; p.y += p.vy; p.r += 0.08;
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
          ctx.fillStyle = p.c; ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6);
          ctx.restore();
        });
        if (Date.now() - t0 < 2200) requestAnimationFrame(frame);
        else ctx.clearRect(0, 0, cv.width, cv.height);
      })();
      try { tg.HapticFeedback.notificationOccurred('success'); } catch (e) {}
    }

    /* ---------- Табло ---------- */
    function renderScoreboard(silent) {
      if (!silent) {
        content.innerHTML = '';
        content.appendChild(segment(
          FORMATS.map(function (f) { return { v: f, t: f }; }),
          boardFormat,
          function (v) { boardFormat = v; renderScoreboard(); }
        ));
        var list = document.createElement('div');
        list.id = 'boardlist';
        list.innerHTML = skeleton(6);
        content.appendChild(list);
      }
      swr('scoreboard', { format: boardFormat }, function (d) {
        hideSplash();
        var list = document.getElementById('boardlist');
        if (!list) return;
        if (!d.rows || !d.rows.length) {
          list.innerHTML = empty('Пока нет результатов текущей игры<br>(' + esc(boardFormat) + ')');
          return;
        }
        var mine = null;
        d.rows.forEach(function (r) { if (myName && r.name === myName) mine = r; });

        var html = '';
        // Подиум: группируем команды ПО МЕСТАМ 1–3. При дележе места все команды
        // встают на одну тумбу (аватарки веером, имена списком) — три тумбы видны всегда.
        var groups = { 1: [], 2: [], 3: [] };
        d.rows.forEach(function (r) { if (r.place <= 3) groups[r.place].push(r); });
        if (groups[1].length && d.rows.length > 1) {
          html += '<div class="podium">';
          [2, 1, 3].forEach(function (pl, k) { // 2-е слева, 1-е в центре, 3-е справа
            var g = groups[pl];
            if (!g.length) return;
            var isMine = g.some(function (r) { return r.name === myName; });
            var names = g.map(function (r) { return esc(r.name); });
            var shownNames = names.slice(0, 2).join('<br>') + (names.length > 2 ? '<br>+ещё ' + (names.length - 2) : '');
            var avas = g.slice(0, 3).map(function (r) { return '<div class="ava">' + initials(r.name) + '</div>'; }).join('');
            html += '<div class="pod p' + pl + (isMine ? ' mine' : '') + '" style="animation-delay:' + (k * 90) + 'ms">' +
              '<div class="avarow">' + avas + '</div>' +
              '<div class="nm">' + shownNames + '</div>' +
              '<div class="pts">' + g[0].points + '</div>' +
              '<div class="base">' + pl + '</div></div>';
          });
          html += '</div>';
        }
        if (mine) {
          var gap;
          if (mine.place > 1) {
            var above = null;
            for (var i = 0; i < d.rows.length; i++) {
              if (d.rows[i].place < mine.place) above = d.rows[i];
            }
            gap = above ? 'До ' + above.place + '-го места: ' + (above.points - mine.points) + ' 🔺' : '';
          } else {
            gap = 'Вы лидируете! 🏆';
          }
          html += '<div class="banner">«' + esc(mine.name) + '» — ' + mine.place + ' место. ' + esc(gap) + '</div>';
        }
        d.rows.forEach(function (r) {
          html += '<div class="row' + (r.name === myName ? ' mine' : '') + ' g' + Math.min(r.place, 4) + '">' +
            '<div class="place">' + r.place + '</div>' +
            '<div class="name">' + esc(r.name) + (r.name === myName ? '<span class="you">ВЫ</span>' : '') + '</div>' +
            '<div class="pts">' + r.points + '</div></div>';
        });
        list.innerHTML = html;
        stagger(list);

        // Конфетти один раз за сессию на формат, если мы первые
        if (mine && mine.place === 1) {
          var key = 'confetti_' + boardFormat;
          try {
            if (!store.getItem(key)) { store.setItem(key, '1'); confetti(); }
          } catch (e) {}
        }
      }, function () {
        hideSplash();
        var list = document.getElementById('boardlist');
        if (list) list.innerHTML = empty('Не удалось загрузить табло.<br>Проверьте связь и попробуйте ещё раз.');
      });
    }

    /* ---------- Сезон ---------- */
    function renderSeason() {
      content.innerHTML = '';

      // Селектор сезона: появляется, когда в архиве есть прошлые сезоны —
      // игроки могут посмотреть любой прошедший сезон
      var seasons = meta && meta.seasons ? meta.seasons : [];
      if (seasons.length > 1) {
        var wrap = document.createElement('div');
        wrap.className = 'pickrow';
        var sel = document.createElement('select');
        sel.className = 'picker';
        seasons.forEach(function (s) {
          var o = document.createElement('option');
          o.value = s;
          o.textContent = (s === meta.currentSeason) ? s + ' · текущий' : s;
          if ((seasonSel || meta.currentSeason) === s) o.selected = true;
          sel.appendChild(o);
        });
        sel.addEventListener('change', function () {
          buzz('light');
          seasonSel = (sel.value === meta.currentSeason) ? '' : sel.value;
          renderSeason();
        });
        wrap.appendChild(sel);
        content.appendChild(wrap);
      }

      content.appendChild(segment(
        [{ v: 'all', t: 'Все' }].concat(FORMATS.map(function (f) { return { v: f, t: f }; })),
        seasonFormat,
        function (v) { seasonFormat = v; renderSeason(); }
      ));
      var list = document.createElement('div');
      list.innerHTML = skeleton(7);
      content.appendChild(list);

      var params = seasonFormat === 'all' ? {} : { format: seasonFormat };
      if (seasonSel) params.season = seasonSel;
      swr('season', params, function (d) {
        seasonEl.textContent = d.season ? d.season : '';
        if (!d.rows || !d.rows.length) { list.innerHTML = empty('Нет данных за сезон.'); return; }
        var html = '';
        d.rows.forEach(function (r) {
          html += '<div class="row' + (r.name === myName ? ' mine' : '') + ' g' + Math.min(r.rank, 4) + '">' +
            '<div class="place">' + r.rank + '</div>' +
            '<div class="name">' + esc(r.name) + (r.name === myName ? '<span class="you">ВЫ</span>' : '') +
            '<div class="sub">' + r.games + ' игр</div></div>' +
            '<div class="pts">' + r.points + '</div></div>';
        });
        list.innerHTML = html;
        stagger(list);
      }, function () { list.innerHTML = empty('Не удалось загрузить рейтинг.'); });
    }

    /* ---------- Профиль ---------- */
    var profileData = null;

    // Показывать ли выбор команды: в браузере (вне Telegram) — всегда,
    // в Telegram — админу (он смотрит любую команду без привязки)
    function canPickTeam() { return !initData || (meta && meta.admin); }

    // Строка «Команда: [выпадающий список]» над профилем
    function teamPickerRow(current) {
      var wrap = document.createElement('div');
      wrap.className = 'pickrow';
      var sel = document.createElement('select');
      sel.className = 'picker';
      var ph = document.createElement('option');
      ph.value = ''; ph.textContent = '— выберите команду —';
      sel.appendChild(ph);
      loadTeams(function (list) {
        (list || []).forEach(function (t) {
          var o = document.createElement('option');
          o.value = t; o.textContent = t;
          if (t === current) o.selected = true;
          sel.appendChild(o);
        });
      });
      sel.addEventListener('change', function () {
        buzz('light');
        viewTeam = sel.value;
        if (!initData) { // в браузере запоминаем выбор как «свою» команду
          try { store.setItem('igr_team', viewTeam); } catch (e) {}
          myName = viewTeam || null;
        }
        renderProfile();
        renderScoreboard(true);
      });
      wrap.appendChild(sel);
      return wrap;
    }

    function renderProfile() {
      content.innerHTML = skeleton(5);
      swr('profile', teamParams(), function (d) {
        if (d.error || !d.name) {
          content.innerHTML = '';
          if (canPickTeam()) {
            content.appendChild(teamPickerRow(viewTeam));
            var hint = document.createElement('div');
            hint.className = 'card bindhint';
            hint.innerHTML = meta && meta.admin && initData
              ? '👑 Режим админа: выберите любую команду, чтобы посмотреть её профиль и ачивки.'
              : 'Выберите свою команду из списка — приложение запомнит выбор и будет подсвечивать её на табло.';
            content.appendChild(hint);
          } else {
            content.innerHTML = '<div class="card bindhint">Чтобы видеть профиль своей команды, ' +
              'перейдите по <b>ссылке-приглашению</b>, которую организатор выдал вашему капитану ' +
              '(капитан может переслать её всей команде).</div>';
          }
          return;
        }
        if (initData && !viewTeam) myName = d.name;
        profileData = d;
        drawProfile();
      }, function () { content.innerHTML = empty('Не удалось загрузить профиль.'); });
    }

    function drawProfile() {
      var d = profileData;
      var s = (profileFormat === 'all') ? (d.stats || {})
        : ((d.statsByFormat && d.statsByFormat[profileFormat]) || {});

      content.innerHTML = '';
      if (canPickTeam()) content.appendChild(teamPickerRow(viewTeam || d.name));
      var head = document.createElement('div');
      head.className = 'phead';
      head.innerHTML = '<div class="ava">' + initials(d.name) + '</div>' +
        '<div><div class="nm">' + esc(d.name) + '</div>' +
        '<div class="sb">' + (s.games || 0) + ' игр · средний балл ' + (s.avg || 0) + '</div></div>';
      content.appendChild(head);

      // Кнопки «Поделиться»: в любой чат и (если клиент умеет) в сторис;
      // в браузере — системное меню «Поделиться» (если оно есть)
      var shareText = '🧠 «' + d.name + '» в квиз-лиге «Игры разума»' +
        (s.seasonPlace ? ': ' + s.seasonPlace + '-е место в сезоне' : '') +
        ', очков: ' + (s.points || 0) + ', побед: ' + (s.wins || 0) + '. Сможешь круче? 😏';
      var share = document.createElement('div');
      share.className = 'sharebar';
      var btnChat = document.createElement('button');
      btnChat.className = 'sharebtn';
      btnChat.textContent = '📣 Поделиться';
      btnChat.addEventListener('click', function () {
        buzz('medium');
        if (!tg && navigator.share) {
          navigator.share({ text: shareText, url: window.BOT_LINK }).catch(function () {});
          return;
        }
        var link = 'https://t.me/share/url?url=' + encodeURIComponent(window.BOT_LINK) +
          '&text=' + encodeURIComponent(shareText);
        if (tg && tg.openTelegramLink) tg.openTelegramLink(link);
        else window.open(link, '_blank');
      });
      share.appendChild(btnChat);
      if (tg && tg.isVersionAtLeast && tg.isVersionAtLeast('7.8') && tg.shareToStory) {
        var btnStory = document.createElement('button');
        btnStory.className = 'sharebtn story';
        btnStory.textContent = '📸 В сторис';
        btnStory.addEventListener('click', function () {
          buzz('medium');
          try {
            tg.shareToStory(new URL('story-bg.jpg', location.href).href, { text: shareText });
          } catch (e) {}
        });
        share.appendChild(btnStory);
      }
      content.appendChild(share);

      content.appendChild(segment(
        [{ v: 'all', t: 'Все' }].concat(FORMATS.map(function (f) { return { v: f, t: f }; })),
        profileFormat,
        function (v) { profileFormat = v; drawProfile(); }
      ));

      var body = document.createElement('div');
      var html = '<div class="metrics">' +
        metric(s.seasonPlace || '—', 'МЕСТО В СЕЗОНЕ', s.seasonPlace === 1) +
        metric(s.wins || 0, 'ПОБЕД', false) +
        metric(s.best || '—', 'ЛУЧШЕЕ МЕСТО', s.best === 1) +
        metric(s.points || 0, 'ОЧКИ СЕЗОНА', false) +
        metric(s.games || 0, 'ИГР', false) +
        metric(s.avg || 0, 'СРЕДНИЙ', false) +
        '</div>';

      var hist = (d.history || []).filter(function (h) { return profileFormat === 'all' || h.format === profileFormat; });
      if (hist.length > 1) {
        html += '<div class="card"><h4>Динамика очков</h4>' + sparkline(hist) + '</div>';
      }
      if (d.badges && d.badges.length) {
        html += '<div class="card"><h4>Ачивки</h4><div class="badges">' +
          d.badges.map(function (b) { return '<div class="badge">🏅 ' + esc(b.title) + '</div>'; }).join('') +
          '</div></div>';
      }
      body.innerHTML = html;
      content.appendChild(body);
      stagger(content);
    }

    function metric(v, k, gold) {
      return '<div class="metric' + (gold ? ' gold' : '') + '"><div class="v">' + esc(v) + '</div><div class="k">' + esc(k) + '</div></div>';
    }

    /* SVG-спарклайн: линия с точками, последняя точка — золотая */
    function sparkline(hist) {
      var w = 300, h = 60, pad = 6;
      var pts = hist.map(function (x) { return x.points; });
      var max = Math.max.apply(null, pts) || 1;
      var min = Math.min.apply(null, pts);
      var span = (max - min) || 1;
      var step = (w - pad * 2) / Math.max(pts.length - 1, 1);
      var coords = pts.map(function (p, i) {
        return [pad + i * step, h - pad - ((p - min) / span) * (h - pad * 2)];
      });
      var line = coords.map(function (c, i) { return (i ? 'L' : 'M') + c[0].toFixed(1) + ' ' + c[1].toFixed(1); }).join(' ');
      var dots = coords.map(function (c, i) {
        var last = i === coords.length - 1;
        return '<circle cx="' + c[0].toFixed(1) + '" cy="' + c[1].toFixed(1) + '" r="' + (last ? 4 : 2.5) + '" fill="' + (last ? 'var(--gold)' : 'var(--accent)') + '"/>';
      }).join('');
      return '<svg class="spark-svg" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
        '<path d="' + line + '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        dots + '</svg>';
    }

    /* ---------- Ачивки ---------- */
    function renderAchievements() {
      content.innerHTML = skeleton(3);
      swr('achievements', teamParams(), function (d) {
        if (d.error || !d.badges) {
          content.innerHTML = canPickTeam()
            ? '<div class="card bindhint">Выберите команду во вкладке «Профиль» — здесь появятся её ачивки.</div>'
            : '<div class="card bindhint">Перейдите по ссылке-приглашению от организатора — и здесь появятся ачивки вашей команды.</div>';
          return;
        }
        if (!d.badges.length) { content.innerHTML = empty('Пока нет ачивок.<br>Всё впереди! 🚀'); return; }
        content.innerHTML = '<div class="card"><h4>' + esc(d.name) + '</h4><div class="badges">' +
          d.badges.map(function (b) { return '<div class="badge">🏅 ' + esc(b.title) + '</div>'; }).join('') +
          '</div></div>';
        stagger(content);
      }, function () { content.innerHTML = empty('Не удалось загрузить ачивки.'); });
    }

    /* ---------- Навигация ---------- */
    var renderers = { scoreboard: renderScoreboard, season: renderSeason, profile: renderProfile, achievements: renderAchievements };

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === tab); });
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
      renderers[tab]();
      if (tab === 'scoreboard') {
        refreshTimer = setInterval(function () {
          if (!document.hidden) renderScoreboard(true); // тихое обновление без мигания скелетонами
        }, 20000);
      }
    }

    document.querySelectorAll('.tab').forEach(function (b) {
      b.addEventListener('click', function () { buzz('light'); switchTab(b.dataset.tab); });
    });

    /* ---------- Старт ---------- */
    // Табло рисуется СРАЗУ (кэш или скелетоны), а «мета» (сезоны, своя команда,
    // админ ли) грузится ПАРАЛЛЕЛЬНО первому экрану — никаких последовательных
    // ожиданий на холодном старте Apps Script.
    function markAdmin() {
      var t = document.querySelector('.title');
      if (t && !t.querySelector('.adminchip')) {
        t.insertAdjacentHTML('beforeend', '<span class="adminchip">👑 админ</span>');
      }
    }

    if (!initData && viewTeam) myName = viewTeam; // браузер: выбранная ранее команда
    switchTab('scoreboard');

    swr('meta', teamParams(), function (d) {
      if (!d || d.error) return;
      meta = d;
      if (d.admin) markAdmin();
      if (d.currentSeason && !seasonEl.textContent) seasonEl.textContent = d.currentSeason;
      var mine = (!initData && viewTeam) ? viewTeam : d.team;
      if (mine && myName !== mine) {
        myName = mine;
        renderScoreboard(true); // тихо перерисовать: подсветить свою команду
      }
    });
    setTimeout(prefetch, 1500); // прогрев остальных вкладок после главного экрана
  })();
  </script>
</body>
</html>
